<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إدارة الخطوط — WE GOLD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e2e8f0;--text:#0f172a;--sub:#64748b;
  --accent:#6b2fa0;--accent-lt:#f3e8ff;--accent-dk:#4a1d7a;
  --green:#16a34a;--green-lt:#dcfce7;--red:#dc2626;--red-lt:#fee2e2;
  --amber:#d97706;--amber-lt:#fef3c7;--blue:#2563eb;--blue-lt:#dbeafe;
  --day1:#1d4ed8;--day16:#7c3aed;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:14px;direction:rtl;}

/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);
  display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo-row{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
.logo-sq{width:38px;height:38px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.logo-sq svg{width:100%;height:100%;}
.login-title{text-align:center;font-size:20px;font-weight:800;color:#1e1b4b;margin-bottom:4px;}
.login-sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:28px;}
.fl{margin-bottom:14px;}
.fl label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;}
.fl input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;
  font-size:14px;color:var(--text);outline:none;transition:.2s;}
.fl input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(107,47,160,.1);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:.2s;}
.login-btn:hover{background:var(--accent-dk);}
.login-err{color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px;}

/* ===== COMPANY SELECTOR ===== */
#company-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);
  display:none;align-items:center;justify-content:center;z-index:998;padding:20px;}
.co-box{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:460px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);}
.co-title{text-align:center;font-size:18px;font-weight:800;color:#1e1b4b;margin-bottom:6px;}
.co-sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:24px;}
.co-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.co-card{border:2px solid var(--border);border-radius:14px;padding:20px 12px;cursor:pointer;
  text-align:center;transition:.2s;background:#fff;}
.co-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(107,47,160,.15);transform:translateY(-2px);}
.co-card.we{border-color:#6b2fa0;} .co-card.we:hover{background:#f3e8ff;}
.co-card.voda{border-color:#e60000;} .co-card.voda:hover{background:#fee2e2;}
.co-card.etis{border-color:#da0812;} .co-card.etis:hover{background:#fee2e2;}
.co-card.oran{border-color:#ff7900;} .co-card.oran:hover{background:#fef3c7;}
.co-icon{font-size:36px;margin-bottom:8px;}
.co-name{font-size:14px;font-weight:800;color:var(--text);}
.co-desc{font-size:11px;color:var(--sub);margin-top:3px;}
.co-back{text-align:center;margin-top:16px;}
.co-back button{background:none;border:none;color:var(--sub);cursor:pointer;font-size:13px;text-decoration:underline;}

/* ===== NAV ===== */
nav{background:#fff;border-bottom:1.5px solid var(--border);padding:0 16px;
  display:none;align-items:center;justify-content:space-between;height:54px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.nav-brand{font-size:14px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:6px;}
.nav-co-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#fff;}
.nav-links{display:flex;gap:2px;}
.nav-link{background:none;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--sub);transition:.15s;}
.nav-link:hover{background:var(--accent-lt);color:var(--accent);}
.nav-link.active{background:var(--accent-lt);color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:8px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--sub);transition:.3s;}
.user-badge{background:var(--accent-lt);color:var(--accent);font-size:12px;font-weight:700;
  padding:4px 10px;border-radius:20px;}
.logout-btn{background:none;border:1.5px solid var(--border);color:var(--sub);
  padding:5px 10px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:.15s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

/* ===== MONTH BAR ===== */
#month-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 16px;
  display:none;align-items:center;gap:8px;overflow-x:auto;}
.mchip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
  border:1.5px solid var(--border);background:none;color:var(--sub);white-space:nowrap;transition:.15s;}
.mchip.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.mchip:hover:not(.act){border-color:var(--accent);color:var(--accent);}
.add-month-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px dashed var(--accent);color:var(--accent);background:none;cursor:pointer;
  white-space:nowrap;transition:.15s;}
.add-month-btn:hover{background:var(--accent-lt);}

/* ===== PAGES ===== */
.page{display:none;padding:20px;max-width:1100px;margin:0 auto;}
.page.show{display:block;}

/* ===== STATS / DASHBOARD ===== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px;}
.stat-card{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-val{font-size:22px;font-weight:800;color:var(--text);}
.stat-lbl{font-size:11px;font-weight:700;color:var(--sub);margin-top:3px;}
.stat-card.green .stat-val{color:var(--green);}
.stat-card.red .stat-val{color:var(--red);}
.stat-card.amber .stat-val{color:var(--amber);}
.stat-card.accent .stat-val{color:var(--accent);}
.stat-card.blue .stat-val{color:var(--blue);}

/* Dashboard tabs */
.dash-tabs{display:flex;gap:8px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:0;}
.dtab{padding:8px 20px;border-radius:8px 8px 0 0;border:2px solid transparent;
  background:none;color:var(--sub);font-size:13px;font-weight:700;cursor:pointer;
  border-bottom:none;margin-bottom:-2px;transition:.15s;}
.dtab.act{background:#fff;border-color:var(--border);border-bottom-color:#fff;color:var(--accent);}
.dtab:hover:not(.act){color:var(--accent);}

/* Breakdown table */
.dash-table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;
  overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border);}
.dash-table th{padding:10px 14px;text-align:right;font-size:11px;font-weight:700;
  color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border);}
.dash-table td{padding:11px 14px;border-bottom:1px solid var(--border);font-size:13px;}
.dash-table tr:last-child td{border-bottom:none;}
.dash-table tr:hover td{background:#fafafa;}
.dash-table .total-row td{font-weight:800;background:var(--accent-lt);color:var(--accent);}

/* Progress bar */
.prog-wrap{background:var(--border);border-radius:20px;height:8px;overflow:hidden;margin-top:6px;}
.prog-bar{height:8px;border-radius:20px;background:var(--green);transition:width .4s;}

/* ===== FILTER TABS ===== */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
.ftab{padding:6px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;
  color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.ftab.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.ftab:hover:not(.act){border-color:var(--accent);color:var(--accent);}
.spacer{flex:1;}
.btn-add-line{padding:7px 16px;border-radius:8px;background:var(--accent);color:#fff;
  border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-add-line:hover{background:var(--accent-dk);}
.btn-add-line.d16{background:var(--day16);}
.btn-add-line.d16:hover{background:#5b21b6;}

/* ===== DAY SECTION ===== */
.day-section{margin-bottom:24px;}
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.day-badge{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:800;color:#fff;}
.day-badge.d1{background:var(--day1);}
.day-badge.d16{background:var(--day16);}
.day-meta{font-size:12px;color:var(--sub);font-weight:600;}

/* ===== LINE CARD ===== */
.line-card{background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);
  margin-bottom:12px;overflow:hidden;}
.line-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;
  border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;}
.line-num{font-size:14px;font-weight:800;color:var(--text);font-family:monospace;}
.line-owner{font-size:11px;color:var(--sub);font-weight:600;background:var(--border);
  padding:2px 8px;border-radius:20px;}
.line-stat{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;}
.ls-paid{background:var(--green-lt);color:var(--green);}
.ls-rev{background:var(--blue-lt);color:var(--blue);}
.ls-profit{background:var(--green-lt);color:var(--green);}
.ls-profit.neg{background:var(--red-lt);color:var(--red);}
.line-actions-group{display:flex;gap:6px;margin-right:auto;}
.btn-sm{padding:4px 10px;border-radius:7px;border:1.5px solid var(--border);background:#fff;
  color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red);}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-sm.primary:hover{background:var(--accent-dk);}

/* ===== CUSTOMERS TABLE ===== */
.custs-table{width:100%;border-collapse:collapse;}
.custs-table th{padding:7px 10px;text-align:center;font-size:11px;font-weight:700;
  color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border);}
.custs-table th:first-child,.custs-table td:first-child{text-align:right;}
.custs-table td{padding:8px 10px;text-align:center;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text);}
.custs-table td:nth-child(2){font-weight:700;}
.custs-table td:nth-child(3){font-family:monospace;font-size:11px;color:var(--sub);}
.custs-table tr:last-child td{border-bottom:none;}
.custs-table tr:hover td{background:#fafafa;}
.toggle-paid{border:none;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;
  cursor:pointer;transition:.15s;white-space:nowrap;}
.tp-paid{background:var(--green-lt);color:var(--green);}
.tp-paid:hover{background:#bbf7d0;}
.tp-pend{background:var(--red-lt);color:var(--red);}
.tp-pend:hover{background:#fecaca;}
.pkg-badge{background:var(--accent-lt);color:var(--accent);padding:2px 6px;border-radius:20px;font-size:10px;font-weight:700;}
.pkg-detail{font-size:10px;color:var(--sub);}
.act-btns{display:flex;gap:4px;justify-content:center;}
.act-btn{width:26px;height:26px;border-radius:6px;border:1.5px solid var(--border);background:#fff;
  cursor:pointer;font-size:12px;transition:.15s;display:flex;align-items:center;justify-content:center;}
.act-btn:hover{background:var(--accent-lt);border-color:var(--accent);}
.act-btn.del:hover{background:var(--red-lt);border-color:var(--red);}
.add-cust-row{padding:8px 14px;text-align:center;}
.btn-add-cust{background:none;border:1.5px dashed var(--accent);color:var(--accent);
  border-radius:8px;padding:5px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-add-cust:hover{background:var(--accent-lt);}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--sub);}
.empty-state .ei{font-size:40px;margin-bottom:10px;}
.empty-state p{font-size:14px;font-weight:600;}

/* ===== MODAL ===== */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:500;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:500px;box-shadow:var(--shadow-md);
  max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:800;color:var(--text);}
.modal-close{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);
  background:#fff;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--red-lt);border-color:var(--red);color:var(--red);}
.modal-body{padding:18px 20px;}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.mfl{margin-bottom:12px;}
.mfl label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:4px;}
.mfl input,.mfl select,.mfl textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;
  padding:9px 12px;font-size:13px;color:var(--text);outline:none;transition:.2s;font-family:inherit;}
.mfl input:focus,.mfl select:focus,.mfl textarea:focus{border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(107,47,160,.1);}
.mfl .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mfl .row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.mfl-hint{font-size:11px;color:var(--sub);margin-top:3px;}
.mfl .check-row{display:flex;align-items:center;gap:8px;padding:10px;background:var(--amber-lt);
  border-radius:9px;border:1px solid var(--amber);}
.mfl .check-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;}
.mfl .check-row label{font-size:13px;font-weight:700;color:var(--amber);margin:0;cursor:pointer;}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:9px 22px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-save:hover{background:var(--accent-dk);}
.btn-cancel{background:#fff;color:var(--sub);border:1.5px solid var(--border);border-radius:9px;
  padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-cancel:hover{border-color:var(--text);color:var(--text);}
.btn-delete-modal{background:var(--red-lt);color:var(--red);border:1.5px solid var(--red);
  border-radius:9px;padding:9px 18px;font-size:14px;font-weight:700;cursor:pointer;}

/* ===== ADMIN PAGE ===== */
.admin-section{background:#fff;border-radius:12px;padding:20px;box-shadow:var(--shadow);
  border:1px solid var(--border);margin-bottom:16px;}
.admin-section h3{font-size:14px;font-weight:800;margin-bottom:14px;color:var(--accent);}
.settings-table{width:100%;border-collapse:collapse;}
.settings-table th{font-size:11px;font-weight:700;color:var(--sub);padding:8px;text-align:right;
  border-bottom:1px solid var(--border);}
.settings-table td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:13px;}
.settings-table tr:last-child td{border:none;}
.badge-role{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-admin{background:var(--amber-lt);color:var(--amber);}
.badge-user{background:var(--blue-lt);color:var(--blue);}
.fb-row{display:flex;gap:8px;align-items:center;}
.fb-input{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;
  font-size:13px;color:var(--text);outline:none;}
.fb-input:focus{border-color:var(--accent);}
.fb-save{background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;}

/* ===== LOGS ===== */
.log-entry{display:flex;gap:12px;padding:9px 14px;border-bottom:1px solid var(--border);align-items:flex-start;}
.log-ts{font-size:11px;color:var(--sub);white-space:nowrap;margin-top:2px;}
.log-action{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-lt);
  padding:1px 8px;border-radius:10px;white-space:nowrap;}
.log-detail{font-size:12px;color:var(--text);}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;
  z-index:9999;display:none;box-shadow:var(--shadow-md);}

/* ===== MISC ===== */
.page-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;}
.no-data{text-align:center;padding:30px;color:var(--sub);font-weight:600;}
.section-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:12px;margin-top:20px;
  display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
@media(max-width:600px){
  .line-hdr{flex-direction:column;align-items:flex-start;}
  .line-actions-group{margin-right:0;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .nav-links .nav-link{padding:6px 8px;font-size:12px;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
<div class="login-box">
  <div class="login-logo-row">
    <div class="logo-sq"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#6b2fa0" rx="10"/><text x="50" y="60" text-anchor="middle" fill="white" font-size="26" font-family="Arial" font-weight="bold">WE</text></svg></div>
    <div class="logo-sq"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#da0812" rx="10"/><text x="50" y="63" text-anchor="middle" fill="white" font-size="18" font-family="Arial" font-weight="bold">e&amp;</text></svg></div>
    <div class="logo-sq"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#e60000" rx="10"/><text x="50" y="60" text-anchor="middle" fill="white" font-size="12" font-family="Arial" font-weight="bold">Voda</text></svg></div>
    <div class="logo-sq"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#ff7900" rx="10"/><text x="50" y="62" text-anchor="middle" fill="white" font-size="12" font-family="Arial" font-weight="bold">orange</text></svg></div>
  </div>
  <div class="login-title">إدارة الخطوط</div>
  <div class="login-sub">WE GOLD · اتصالات · فودافون · أورانج</div>
  <div class="fl"><label>اسم المستخدم</label><input id="login-user" placeholder="ahmed.h" autocomplete="off"></div>
  <div class="fl"><label>كلمة المرور</label><input id="login-pass" type="password" placeholder="••••••••"></div>
  <button class="login-btn" onclick="doLogin()">تسجيل الدخول</button>
  <div class="login-err" id="login-error"></div>
</div>
</div>

<!-- COMPANY SELECTOR -->
<div id="company-screen">
<div class="co-box">
  <div class="co-title">اختار الشركة</div>
  <div class="co-sub" id="co-welcome"></div>
  <div class="co-grid">
    <div class="co-card we" onclick="selectCompany('we')">
      <div class="co-icon">🟣</div>
      <div class="co-name">وي</div>
      <div class="co-desc">WE GOLD</div>
    </div>
    <div class="co-card voda" onclick="selectCompany('vodafone')">
      <div class="co-icon">🔴</div>
      <div class="co-name">فودافون</div>
      <div class="co-desc">Vodafone Egypt</div>
    </div>
    <div class="co-card etis" onclick="selectCompany('etisalat')">
      <div class="co-icon">🔶</div>
      <div class="co-name">اتصالات</div>
      <div class="co-desc">e& Egypt</div>
    </div>
    <div class="co-card oran" onclick="selectCompany('orange')">
      <div class="co-icon">🟠</div>
      <div class="co-name">أورانج</div>
      <div class="co-desc">Orange Egypt</div>

// Firebase
function fbUrl(){return localStorage.getItem('lm_fb_url')||'';}
function fbStatus(ok){const e=document.getElementById('sync-dot');if(e)e.style.background=ok===null?'#94a3b8':ok?'#16a34a':'#dc2626';}
async function fbPush(un,data){const u=fbUrl();if(!u)return;try{const r=await fetch(`${u}/users/${encodeURIComponent(un)}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({data,t:Date.now()})});fbStatus(r.ok);}catch{fbStatus(false);}}
async function fbPull(un){const u=fbUrl();if(!u)return null;try{const r=await fetch(`${u}/users/${encodeURIComponent(un)}.json`);if(!r.ok)return null;const j=await r.json();fbStatus(true);return j?.data||null;}catch{fbStatus(false);return null;}}

// Storage
function getSys(){
  let d=localStorage.getItem(SYS_KEY);
  if(!d){for(const k of['lm_sys_v6','lm_sys_v5','lm_sys_v4','lm_sys_v3','lm_sys_v2']){const o=localStorage.getItem(k);if(o){d=o;localStorage.setItem(SYS_KEY,o);break;}}}
  return d?JSON.parse(d):initSys();
}
function initSys(){
  const s={users:{
    admin:{username:'admin',displayName:'الأدمن',password:'admin123',role:'admin',data:{}},
    'ahmed.h':{username:'ahmed.h',displayName:'Ahmed H',password:'WeGold2000',role:'user',data:{}},
    'rania.m':{username:'rania.m',displayName:'Rania M',password:'WeGold2000',role:'user',data:{}},
    'madona.n':{username:'madona.n',displayName:'Madona N',password:'WeGold2000',role:'user',data:{}},
  }};
  localStorage.setItem(SYS_KEY,JSON.stringify(s));return s;
}
function saveSys(s){localStorage.setItem(SYS_KEY,JSON.stringify(s));if(CU)fbPush(CU.username,s.users[CU.username]?.data);}
function applySeed(un){
  const s=getSys();const u=s.users[un];if(!u)return;
  const sd=SEED[un];if(!sd)return;
  if(!u.data)u.data={};if(!u.data.months)u.data.months={};
  let changed=false;
  for(const[mk,mv]of Object.entries(sd.months)){if(!u.data.months[mk]){u.data.months[mk]=mv;changed=true;}}
  if(u.seedVersion!==SEED_VERSION){u.seedVersion=SEED_VERSION;changed=true;}
  if(changed)saveSys(s);
}

let CU=null, CM='', CC='we'; // current user, month, company
function gd(){const s=getSys();return s.users[CU.username].data||{};}
function sd2(d){const s=getSys();s.users[CU.username].data=d;saveSys(s);}
function gm(){const d=gd();if(!d.months||!d.months[CM])return null;return d.months[CM];}
function sm(m){const d=gd();if(!d.months)d.months={};d.months[CM]=m;sd2(d);}
function getAllMonths(){const d=gd();if(!d.months)return[];return Object.keys(d.months).sort((a,b)=>b.localeCompare(a)).map(k=>d.months[k]);}
function getMonthLabel(key){const p=key.split('-');const names=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return(names[parseInt(p[1])-1]||p[1])+' '+p[0];}
function uid(){return '_'+Math.random().toString(36).slice(2,9);}
function emptyMonth(key){return{key,label:getMonthLabel(key),lines:{we:{},vodafone:{},etisalat:{},orange:{}},customers:{},companySettings:{}};}

// Audit log
function addLog(action,detail){
  try{const d=gd();if(!d.logs)d.logs=[];
  d.logs.unshift({ts:new Date().toISOString(),u:CU.username,n:CU.displayName,a:action,d:detail});
  if(d.logs.length>500)d.logs.length=500;sd2(d);}catch{}
}

function toast(msg,ok=true){
  const t=document.getElementById('toast');

  t.style.display='block';setTimeout(()=>t.style.display='none',2500);

// ===== LOGIN / COMPANY / LOGOUT =====
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});

async function doLogin(){
  const un=document.getElementById('login-user').value.trim().toLowerCase();
  const pw=document.getElementById('login-pass').value;
  const sys=getSys();const user=sys.users[un];
  if(!user||user.password!==pw){document.getElementById('login-error').textContent='اسم المستخدم أو كلمة المرور غير صحيحة';return;}
  document.getElementById('login-error').textContent='جاري تسجيل الدخول...';
  CU={username:user.username,displayName:user.displayName,role:user.role};
  const cloud=await fbPull(un);
  if(cloud){const s=getSys();s.users[un].data=cloud;localStorage.setItem(SYS_KEY,JSON.stringify(s));}
  applySeed(un);
  document.getElementById('login-error').textContent='';
  document.getElementById('login-screen').style.display='none';
  // Show company selector
  document.getElementById('co-welcome').textContent='مرحباً '+user.displayName+' — اختار الشركة اللي هتشتغل عليها';
  document.getElementById('company-screen').style.display='flex';
}

function backToLogin(){
  CU=null;
  document.getElementById('company-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-error').textContent='';
}

function selectCompany(co){
  CC=co;
  const meta=COMPANIES_META[co];
  document.getElementById('company-screen').style.display='none';
  document.getElementById('main-nav').style.display='flex';
  document.getElementById('month-bar').style.display='flex';
  document.getElementById('nav-username').textContent=CU.displayName;
  document.getElementById('nav-co-name').textContent=meta.name;
  const badge=document.getElementById('nav-co-badge');
  badge.textContent=meta.emoji+' '+meta.name;
  badge.style.background=meta.color;
  if(CU.role==='admin')document.getElementById('nav-admin').style.display='';
  const months=getAllMonths();
  CM=months.length?months[0].key:(()=>{
    const now=new Date();const key=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');
    const d=gd();d.months=d.months||{};d.months[key]=emptyMonth(key);sd2(d);return key;
  })();
  renderMonthBar();showPage('home');
}

function doLogout(){
  CU=null;CC='we';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('company-screen').style.display='none';
  document.getElementById('main-nav').style.display='none';
  document.getElementById('month-bar').style.display='none';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('login-user').value='';document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('nav-admin').style.display='none';
}

// ===== NAVIGATION =====
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('show');
  document.querySelectorAll('.nav-link').forEach(b=>{if(b.onclick&&b.onclick.toString().includes("'"+name+"'"))b.classList.add('active');});
  if(name==='home')renderHome();
  else if(name==='dash')renderDash();
  else if(name==='admin')renderAdmin();
  else if(name==='logs')renderLogs();
}

  document.getElementById('month-chips').innerHTML=months.map(m=>`<button class="mchip ${m.key===CM?'act':''}" onclick="selectMonth('${m.key}')">${m.label||getMonthLabel(m.key)}</button>`).join('');
}
function selectMonth(key){CM=key;renderMonthBar();const active=document.querySelector('.page.show');if(active?.id==='page-dash')renderDash();else renderHome();}

// ===== HOME PAGE =====
function renderHome(){
  const m=gm();
  const el=document.getElementById('page-home');
  if(!m){el.innerHTML='<div class="no-data">لا توجد بيانات لهذا الشهر</div>';return;}
  const coLines=getCoLines(m,CC);
  const allCusts=getCoCustomers(m,Object.keys(coLines));
  const nPaid=allCusts.filter(c=>c.paidStatus==='paid').length;
  const rev=allCusts.reduce((s,c)=>s+(c.paid||0),0);
  const cost=Object.values(coLines).reduce((s,l)=>s+(l.wegoldPkg?.cost||0),0);
  const profit=rev-cost;
  const pct=allCusts.length?Math.round(nPaid/allCusts.length*100):0;
  const day1Lines=Object.values(coLines).filter(l=>l.renewDay===1).sort((a,b)=>a.number?.localeCompare(b.number||'')||0);
  const day16Lines=Object.values(coLines).filter(l=>l.renewDay===16).sort((a,b)=>a.number?.localeCompare(b.number||'')||0);
  el.innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${Object.keys(coLines).length}</div><div class="stat-lbl">الخطوط</div></div>
      <div class="stat-card"><div class="stat-val">${allCusts.length}</div><div class="stat-lbl">العملاء</div></div>
      <div class="stat-card green"><div class="stat-val">${nPaid}</div><div class="stat-lbl">دفعوا ✓</div></div>
      <div class="stat-card ${allCusts.length-nPaid>0?'amber':'green'}"><div class="stat-val">${allCusts.length-nPaid}</div><div class="stat-lbl">لم يدفعوا</div></div>
      <div class="stat-card accent"><div class="stat-val">${pct}%</div><div class="stat-lbl">نسبة التحصيل</div></div>
      <div class="stat-card blue"><div class="stat-val">${rev.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الإيرادات</div></div>
      <div class="stat-card ${profit>=0?'green':'red'}"><div class="stat-val">${profit.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الربح</div></div>
    </div>
    <div class="filter-tabs">
      <button class="ftab act" id="ft-all" onclick="setFilter('all')">الكل (${Object.keys(coLines).length})</button>
      <button class="ftab" id="ft-d1" onclick="setFilter('d1')">يوم 1 (${day1Lines.length})</button>
      <button class="ftab" id="ft-d16" onclick="setFilter('d16')">يوم 16 (${day16Lines.length})</button>
      <div class="spacer"></div>
      <button class="btn-add-line" onclick="showAddLine(1)">+ خط يوم 1</button>
      <button class="btn-add-line d16" onclick="showAddLine(16)">+ خط يوم 16</button>
    </div>
    <div id="lines-container"></div>
  `;
  _curFilter='all';renderLinesContainer(day1Lines,day16Lines);
}

let _curFilter='all';
function setFilter(f){
  _curFilter=f;
  ['all','d1','d16'].forEach(x=>document.getElementById('ft-'+x)?.classList.toggle('act',x===f));
  const m=gm();if(!m)return;
  const coLines=getCoLines(m,CC);
  renderLinesContainer(Object.values(coLines).filter(l=>l.renewDay===1),Object.values(coLines).filter(l=>l.renewDay===16));
}

function renderLinesContainer(day1,day16){
  const el=document.getElementById('lines-container');if(!el)return;
  let html='';
  if(_curFilter!=='d16'&&day1.length)
    html+=`<div class="day-section"><div class="day-hdr"><span class="day-badge d1">يوم 1</span><span class="day-meta">${day1.length} خط</span></div>${day1.map(l=>renderLineCard(l)).join('')}</div>`;
  if(_curFilter!=='d1'&&day16.length)
    html+=`<div class="day-section"><div class="day-hdr"><span class="day-badge d16">يوم 16</span><span class="day-meta">${day16.length} خط</span></div>${day16.map(l=>renderLineCard(l)).join('')}</div>`;
  if(!html)html='<div class="empty-state"><div class="ei">📭</div><p>لا توجد خطوط. اضغط "+ خط جديد" لإضافة خط.</p></div>';
  el.innerHTML=html;
}

function renderLineCard(line){
  const m=gm();if(!m)return'';
  const custs=Object.values(m.customers[line.id]||{}).sort((a,b)=>(a.seq||0)-(b.seq||0));
  const paid=custs.filter(c=>c.paidStatus==='paid');
  const rev=paid.reduce((s,c)=>s+(c.paid||0),0);
  const cost=line.wegoldPkg?.cost||0;
  const profit=rev-cost;
  const pct=custs.length?Math.round(paid.length/custs.length*100):0;
  const maxC=line.wegoldPkg?.sharedLines||6;
  const isFull=custs.length>=maxC;
  return `<div class="line-card" id="lc-${line.id}">
    <div class="line-hdr">
      <span class="line-num">📱 ${line.number||'—'}</span>
      ${line.ownerName?`<span class="line-owner">${line.ownerName}</span>`:''}
      <span class="line-stat ls-paid">${paid.length}/${custs.length} دفعوا (${pct}%)</span>
      <span class="line-stat ls-rev">${rev.toLocaleString('ar-EG')} ج</span>
      <span class="line-stat ls-profit ${profit<0?'neg':''}">${profit>=0?'+':''}${profit.toLocaleString('ar-EG')} ج</span>
      <div class="line-actions-group">
        ${!isFull?`<button class="btn-sm primary" onclick="showAddCust('${line.id}')">+ عميل</button>`:`<span style="font-size:11px;color:var(--sub)">مكتمل ${custs.length}/${maxC}</span>`}
        <button class="btn-sm" onclick="showEditLine('${line.id}')">✏️</button>
        <button class="btn-sm danger" onclick="confirmDeleteLine('${line.id}')">🗑️</button>
      </div>
    </div>
    ${custs.length?`<table class="custs-table">
      <thead><tr><th>#</th><th>الاسم</th><th>الرقم</th><th>الباقة</th><th>الجيجا</th><th>الدقايق</th><th>السعر</th><th>الحالة</th><th></th></tr></thead>
      <tbody>${custs.map((c,i)=>renderCustRow(c,line.id,i+1)).join('')}</tbody>
    </table>`:''}
    <div class="add-cust-row">${!isFull?`<button class="btn-add-cust" onclick="showAddCust('${line.id}')">+ إضافة عميل</button>`:''}</div>
  </div>`;
}

function renderCustRow(c,lid,i){
  const isPaid=c.paidStatus==='paid';
  const gb=c.customGb!==undefined?c.customGb:(PKG_DATA[c.pkgId]?.gb||'—');
  const min=c.customMin!==undefined?c.customMin:(PKG_DATA[c.pkgId]?.min||'—');
  const pr=isPaid?(c.paid||0):0;
  return `<tr id="cr-${c.id}">
    <td style="color:var(--sub);font-size:11px">${i}</td>
    <td>${c.name||'—'}</td>
    <td>${c.phone||''}</td>
    <td><span class="pkg-badge">${c.customGb!==undefined?'مخصص':(c.pkgId||'—')}</span></td>
    <td style="font-weight:700;color:var(--blue)">${gb} GB</td>
    <td style="font-weight:700;color:var(--accent)">${min} د</td>
    <td style="font-weight:700">${isPaid?pr.toLocaleString('ar-EG')+' ج':'—'}</td>
    <td><button class="toggle-paid ${isPaid?'tp-paid':'tp-pend'}" onclick="togglePaid('${lid}','${c.id}')">${isPaid?'✓ دفع':'⏳ معلق'}</button></td>
    <td><div class="act-btns">
      <button class="act-btn" onclick="showEditCust('${lid}','${c.id}')">✏️</button>
      <button class="act-btn del" onclick="confirmDeleteCust('${lid}','${c.id}')">🗑️</button>
    </div></td>
  </tr>`;
}

// ===== HELPERS =====
function getCoLines(m,co){
  if(!m||!m.lines)return{};
  return m.lines[co]||{};
}
function getCoCustomers(m,lineIds){
  if(!m||!m.customers)return[];
  return lineIds.flatMap(lid=>Object.values(m.customers[lid]||{}));
}
function findLine(lid){
  const m=gm();if(!m)return null;
  for(const co of Object.keys(COMPANIES_META)){
    const l=m.lines?.[co]?.[lid];if(l)return{...l,_co:co};
  }
  return null;
}

// ===== TOGGLE PAID =====
function togglePaid(lid,cid){
  const m=gm();if(!m||!m.customers[lid]||!m.customers[lid][cid])return;
  const c=m.customers[lid][cid];
  const wasPaid=c.paidStatus==='paid';
  c.paidStatus=wasPaid?'pending':'paid';
  c.paid=wasPaid?0:pkgPrice(c.pkgId,c);
  sm(m);
  addLog('تحديث دفع',`${c.name||c.phone} — ${c.paidStatus==='paid'?'دفع ✓':'معلق ⏳'}`);
  const line=findLine(lid);if(!line)return;
  const cardEl=document.getElementById('lc-'+lid);
  if(cardEl){const tmp=document.createElement('div');tmp.innerHTML=renderLineCard(line);cardEl.replaceWith(tmp.firstChild);}
  refreshStats();
  toast(c.paidStatus==='paid'?`✓ ${c.name||c.phone} — دفع`:`⏳ ${c.name||c.phone} — معلق`,c.paidStatus==='paid');
}

function refreshStats(){
  const m=gm();if(!m)return;
  const coLines=getCoLines(m,CC);
  const allCusts=getCoCustomers(m,Object.keys(coLines));
  const nPaid=allCusts.filter(c=>c.paidStatus==='paid').length;
  const rev=allCusts.reduce((s,c)=>s+(c.paid||0),0);
  const cost=Object.values(coLines).reduce((s,l)=>s+(l.wegoldPkg?.cost||0),0);
  const profit=rev-cost;
  const pct=allCusts.length?Math.round(nPaid/allCusts.length*100):0;
  const el=document.querySelector('#page-home .stats-row');
  if(el)el.innerHTML=`
    <div class="stat-card"><div class="stat-val">${Object.keys(coLines).length}</div><div class="stat-lbl">الخطوط</div></div>
    <div class="stat-card"><div class="stat-val">${allCusts.length}</div><div class="stat-lbl">العملاء</div></div>
    <div class="stat-card green"><div class="stat-val">${nPaid}</div><div class="stat-lbl">دفعوا ✓</div></div>
    <div class="stat-card ${allCusts.length-nPaid>0?'amber':'green'}"><div class="stat-val">${allCusts.length-nPaid}</div><div class="stat-lbl">لم يدفعوا</div></div>
    <div class="stat-card accent"><div class="stat-val">${pct}%</div><div class="stat-lbl">نسبة التحصيل</div></div>
    <div class="stat-card blue"><div class="stat-val">${rev.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الإيرادات</div></div>
    <div class="stat-card ${profit>=0?'green':'red'}"><div class="stat-val">${profit.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الربح</div></div>
  `;
}

// ===== MODAL HELPERS =====
function openModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function modalHead(title){return`<div class="modal-head"><div class="modal-title">${title}</div><button class="modal-close" onclick="closeModal()">✕</button></div>`;}

    <div class="mfl"><label>اسم صاحب الخط</label><input id="ml-owner" placeholder="احمد حسن بهاء"></div>
    <div class="mfl"><label>يوم الدفع</label><select id="ml-day">
      <option value="1" ${day===1?'selected':''}>يوم 1</option>

function showEditLine(lid){
  const line=findLine(lid);if(!line)return;
  openModal(`${modalHead('تعديل الخط')}
  <div class="modal-body">
    <div class="mfl"><label>رقم الخط</label><input id="ml-num" value="${line.number||''}" dir="ltr"></div>
    <div class="mfl"><label>اسم صاحب الخط</label><input id="ml-owner" value="${line.ownerName||''}"></div>
    <div class="mfl"><label>يوم الدفع</label><select id="ml-day">
      <option value="1" ${line.renewDay===1?'selected':''}>يوم 1</option>
      <option value="16" ${line.renewDay===16?'selected':''}>يوم 16</option>
    </select></div>
    <div class="mfl"><label>باقة WE GOLD</label><select id="ml-pkg">
      ${WE_GOLD_PKGS.map(p=>`<option value="${p.idx}" ${(line.wegoldPkg?.idx||5)===p.idx?'selected':''}>${p.name} — ${p.cost} ج (${p.sharedLines} مشتركين)</option>`).join('')}
    </select></div>
    <div class="mfl"><label>ملاحظات</label><textarea id="ml-notes" rows="2">${line.notes||''}</textarea></div>
  </div>
  <div class="modal-foot">
    <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    <button class="btn-save" onclick="saveLine('${lid}','${line._co}')">حفظ التعديل</button>
  </div>`);
}

function saveLine(lid=null,co=null){
  if(!co)co=CC;
  const num=document.getElementById('ml-num').value.trim();
  const owner=document.getElementById('ml-owner').value.trim();
  const day=parseInt(document.getElementById('ml-day').value);
  const pkgIdx=parseInt(document.getElementById('ml-pkg').value);
  const notes=document.getElementById('ml-notes').value.trim();
  if(!num){alert('أدخل رقم الخط');return;}
  const pkg=WE_GOLD_PKGS[pkgIdx];
  const m=gm();if(!m)return;
  if(!m.lines)m.lines={};if(!m.lines[co])m.lines[co]={};
  if(!lid){
    lid='l_'+num.slice(-6)+'_'+uid();
    m.lines[co][lid]={id:lid,number:num,renewDay:day,ownerName:owner,notes,company:co,wegoldPkg:pkg};
    if(!m.customers[lid])m.customers[lid]={};
    addLog('إضافة خط',`${num} — ${owner||'بدون مالك'}`);toast('✓ تم إضافة الخط');
  } else {
    m.lines[co][lid]={...m.lines[co][lid],number:num,renewDay:day,ownerName:owner,notes,wegoldPkg:pkg};
    addLog('تعديل خط',`${num} — ${owner}`);toast('✓ تم تعديل الخط');
  }
  sm(m);closeModal();renderHome();
}

function confirmDeleteLine(lid){
  const line=findLine(lid);if(!line)return;
  const m=gm();const nCusts=Object.keys(m?.customers?.[lid]||{}).length;
  openModal(`${modalHead('حذف الخط')}
  <div class="modal-body" style="text-align:center;padding:24px">
    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
    <p style="font-size:15px;font-weight:700;margin-bottom:8px">حذف الخط ${line.number}؟</p>
    <p style="color:var(--sub);font-size:13px">سيتم حذف الخط و${nCusts} عميل. لا يمكن التراجع.</p>
  </div>
  <div class="modal-foot">
    <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    <button class="btn-delete-modal" onclick="deleteLine('${lid}','${line._co}')">حذف نهائياً</button>
  </div>`);
}

function deleteLine(lid,co){
  const m=gm();if(!m)return;
  const line=m.lines[co]?.[lid];
  delete m.lines[co][lid];delete m.customers[lid];
  addLog('حذف خط',`${line?.number||lid}`);
  sm(m);closeModal();toast('تم حذف الخط',false);renderHome();
}

// ===== ADD / EDIT CUSTOMER =====
function pkgSelectHtml(selId=''){
  let opts=Object.entries(PKG_DATA).map(([k,v])=>`<option value="${k}" ${k===selId?'selected':''}>${v.label} — ${v.price} ج</option>`).join('');
  opts+=`<option value="custom" ${'custom'===selId?'selected':''}>🔧 باقة مخصصة</option>`;
  return opts;
}

    <div id="custom-pkg-fields" style="${isCustom?'':'display:none'}">
      <div class="mfl"><label>تفاصيل الباقة المخصصة</label>
        <div class="row3">
          <div><label style="font-size:11px">الجيجا (GB)</label><input id="mc-gb" type="number" value="${c.customGb||''}" min="0"></div>

function toggleCustomPkg(){
  const v=document.getElementById('mc-pkg').value;
  document.getElementById('custom-pkg-fields').style.display=v==='custom'?'':'none';
}

function saveCust(lid,cid=null){
  const name=document.getElementById('mc-name').value.trim();
  const phone=document.getElementById('mc-phone').value.trim().replace(/[\s\-]/g,'');
  const pkgId=document.getElementById('mc-pkg').value;
  const status=document.getElementById('mc-status').value;
  const notes=document.getElementById('mc-notes').value.trim();
  if(!phone){alert('أدخل رقم الهاتف');return;}
  const m=gm();if(!m)return;
  if(!m.customers[lid])m.customers[lid]={};
  let custData={name,phone,pkgId:pkgId==='custom'?'custom':pkgId,paidStatus:status,notes};
  if(pkgId==='custom'){
    const gb=parseFloat(document.getElementById('mc-gb').value)||0;
    const min=parseFloat(document.getElementById('mc-min').value)||0;
    const price=parseFloat(document.getElementById('mc-price').value)||0;
    custData.customGb=gb;custData.customMin=min;custData.customPrice=price;
    custData.paid=status==='paid'?price:0;
    delete custData.pkgId;
  } else {
    custData.paid=status==='paid'?(PKG_DATA[pkgId]?.price||0):0;
  }
  if(!cid){
    cid='c_'+phone.slice(-8)+'_'+uid();
    custData.id=cid;custData.seq=Object.keys(m.customers[lid]).length+1;
    m.customers[lid][cid]=custData;
    addLog('إضافة عميل',`${name||phone}`);toast('✓ تم إضافة العميل');
  } else {
    m.customers[lid][cid]={...m.customers[lid][cid],...custData,id:cid};
    addLog('تعديل عميل',`${name||phone}`);toast('✓ تم حفظ التعديل');
  }
  sm(m);closeModal();
  const line=findLine(lid);
  const cardEl=document.getElementById('lc-'+lid);
  if(cardEl&&line){const tmp=document.createElement('div');tmp.innerHTML=renderLineCard(line);cardEl.replaceWith(tmp.firstChild);}
  refreshStats();
}

function confirmDeleteCust(lid,cid){
  const m=gm();if(!m||!m.customers[lid]?.[cid])return;
  const c=m.customers[lid][cid];
  openModal(`${modalHead('حذف العميل')}
  <div class="modal-body" style="text-align:center;padding:24px">
    <div style="font-size:36px;margin-bottom:12px">⚠️</div>
    <p style="font-size:15px;font-weight:700;margin-bottom:8px">حذف ${c.name||c.phone}؟</p>
    <p style="color:var(--sub);font-size:13px">لا يمكن التراجع عن هذا الإجراء.</p>
  </div>
  <div class="modal-foot">
    <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    <button class="btn-delete-modal" onclick="deleteCust('${lid}','${cid}')">حذف</button>
  </div>`);
}

function deleteCust(lid,cid){
  const m=gm();if(!m)return;
  const c=m.customers[lid]?.[cid];
  delete m.customers[lid][cid];
  addLog('حذف عميل',`${c?.name||c?.phone||cid}`);
  sm(m);closeModal();toast('تم حذف العميل',false);
  const line=findLine(lid);
  const cardEl=document.getElementById('lc-'+lid);
  if(cardEl&&line){const tmp=document.createElement('div');tmp.innerHTML=renderLineCard(line);cardEl.replaceWith(tmp.firstChild);}
  refreshStats();
}

// ===== ADD MONTH (with copy) =====
function showAddMonth(){
  const months=getAllMonths();
  const now=new Date();
  const defKey=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');
  const prevKey=months.length?months[0].key:'';
  openModal(`${modalHead('إضافة شهر جديد')}
  <div class="modal-body">
    <div class="mfl"><label>الشهر (YYYY-MM)</label><input id="nm-key" value="${defKey}" dir="ltr" placeholder="2026-08"></div>
    <div class="mfl"><label>الاسم (اختياري)</label><input id="nm-label" placeholder="أغسطس 2026"></div>
    ${prevKey?`<div class="mfl">
      <div class="check-row">
        <input type="checkbox" id="nm-copy" onchange="toggleCopyInfo()">
        <label for="nm-copy">نسخ بيانات ${getAllMonths()[0].label||getMonthLabel(prevKey)} (كل العملاء = لم يدفعوا)</label>
      </div>
      <div id="nm-copy-info" style="display:none;margin-top:8px;padding:8px;background:var(--bg);border-radius:8px;font-size:12px;color:var(--sub)">
        ✓ سيتم نسخ كل الخطوط والعملاء من الشهر السابق — كل العملاء هيبقوا "لم يدفع" وأنت تعدّل على من دفع
      </div>
    </div>`:''}
  </div>
  <div class="modal-foot"><button class="btn-cancel" onclick="closeModal()">إلغاء</button><button class="btn-save" onclick="addMonth('${prevKey}')">إنشاء</button></div>`);
}

function toggleCopyInfo(){
  const cb=document.getElementById('nm-copy');
  const info=document.getElementById('nm-copy-info');
  if(info)info.style.display=cb?.checked?'':'none';
}

function addMonth(prevKey=''){
  const key=document.getElementById('nm-key').value.trim();
  const label=document.getElementById('nm-label').value.trim()||getMonthLabel(key);
  if(!key||!/^\d{4}-\d{2}$/.test(key)){alert('صيغة غير صحيحة. استخدم YYYY-MM مثل 2026-08');return;}
  const d=gd();if(!d.months)d.months={};
  if(d.months[key]){alert('هذا الشهر موجود بالفعل');return;}
  const copyChecked=document.getElementById('nm-copy')?.checked;
  if(copyChecked&&prevKey&&d.months[prevKey]){
    // Deep clone previous month, reset all paid statuses
    const prev=JSON.parse(JSON.stringify(d.months[prevKey]));
    prev.key=key;prev.label=label;
    // Reset all customers to pending
    for(const lid of Object.keys(prev.customers||{})){
      for(const cid of Object.keys(prev.customers[lid]||{})){
        const c=prev.customers[lid][cid];
        c.paidStatus='pending';c.paid=0;
      }
    }
    d.months[key]=prev;
    addLog('نسخ شهر',`${getMonthLabel(prevKey)} → ${label}`);
  } else {
    d.months[key]=emptyMonth(key);d.months[key].label=label;
    addLog('إضافة شهر',`${label}`);
  }
  sd2(d);CM=key;closeModal();renderMonthBar();renderHome();toast('✓ تم إنشاء الشهر');
}

// ===== DASHBOARD PAGE =====
let _dashTab='all';
function renderDash(){
  const el=document.getElementById('page-dash');
  const m=gm();
  if(!m){el.innerHTML='<div class="no-data">لا توجد بيانات</div>';return;}
  const coLines=getCoLines(m,CC);
  const day1Ids=Object.keys(Object.fromEntries(Object.entries(coLines).filter(([,l])=>l.renewDay===1)));
  const day16Ids=Object.keys(Object.fromEntries(Object.entries(coLines).filter(([,l])=>l.renewDay===16)));
  const allIds=Object.keys(coLines);
  const stats=computeStats(m,allIds,coLines);
  const stats1=computeStats(m,day1Ids,Object.fromEntries(Object.entries(coLines).filter(([,l])=>l.renewDay===1)));
  const stats16=computeStats(m,day16Ids,Object.fromEntries(Object.entries(coLines).filter(([,l])=>l.renewDay===16)));

  const cur=_dashTab==='d1'?stats1:_dashTab==='d16'?stats16:stats;
  el.innerHTML=`
    <div class="page-title">📊 لوحة الإيرادات — ${m.label||getMonthLabel(CM)}</div>
    <div class="dash-tabs">
      <button class="dtab ${_dashTab==='all'?'act':''}" onclick="switchDashTab('all')">الكل</button>
      <button class="dtab ${_dashTab==='d1'?'act':''}" onclick="switchDashTab('d1')">يوم 1 فقط</button>
      <button class="dtab ${_dashTab==='d16'?'act':''}" onclick="switchDashTab('d16')">يوم 16 فقط</button>
    </div>
    ${renderDashBody(_dashTab==='d1'?stats1:_dashTab==='d16'?stats16:stats, _dashTab==='all'?{stats,stats1,stats16}:null, m, coLines)}
  `;
}

function switchDashTab(tab){_dashTab=tab;renderDash();}

function computeStats(m,lineIds,linesObj){
  const custs=lineIds.flatMap(lid=>Object.values(m.customers[lid]||{}));
  const paid=custs.filter(c=>c.paidStatus==='paid');
  const rev=paid.reduce((s,c)=>s+(c.paid||0),0);
  const cost=Object.values(linesObj).reduce((s,l)=>s+(l.wegoldPkg?.cost||0),0);
  const profit=rev-cost;
  return{lines:lineIds.length,custs:custs.length,paid:paid.length,unpaid:custs.length-paid.length,rev,cost,profit,pct:custs.length?Math.round(paid.length/custs.length*100):0,custs_list:custs,lines_list:Object.values(linesObj)};
}

function renderDashBody(s, compare, m, coLines){
  const profitCls=s.profit>=0?'green':'red';
  let html=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${s.lines}</div><div class="stat-lbl">خطوط</div></div>
      <div class="stat-card"><div class="stat-val">${s.custs}</div><div class="stat-lbl">عملاء</div></div>
      <div class="stat-card green"><div class="stat-val">${s.paid}</div><div class="stat-lbl">دفعوا</div></div>
      <div class="stat-card amber"><div class="stat-val">${s.unpaid}</div><div class="stat-lbl">لم يدفعوا</div></div>
      <div class="stat-card accent"><div class="stat-val">${s.pct}%</div><div class="stat-lbl">نسبة التحصيل</div></div>
      <div class="stat-card blue"><div class="stat-val">${s.rev.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الإيرادات</div></div>
      <div class="stat-card red"><div class="stat-val">${s.cost.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">التكاليف</div></div>
      <div class="stat-card ${profitCls}"><div class="stat-val">${s.profit>=0?'+':''}${s.profit.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الربح الصافي</div></div>
    </div>
    <div class="prog-wrap"><div class="prog-bar" style="width:${s.pct}%"></div></div>
    <div style="text-align:center;font-size:11px;color:var(--sub);margin-top:4px;margin-bottom:16px">${s.pct}% نسبة التحصيل</div>
  `;

  // If showing all, show comparison table day1 vs day16
  if(compare){
    html+=`
    <div class="section-title">مقارنة يوم 1 مقابل يوم 16</div>
    <table class="dash-table" style="margin-bottom:20px">
      <thead><tr><th>البيان</th><th>يوم 1</th><th>يوم 16</th><th>الإجمالي</th></tr></thead>
      <tbody>
        <tr><td>عدد الخطوط</td><td>${compare.stats1.lines}</td><td>${compare.stats16.lines}</td><td style="font-weight:700">${compare.stats.lines}</td></tr>
        <tr><td>عدد العملاء</td><td>${compare.stats1.custs}</td><td>${compare.stats16.custs}</td><td style="font-weight:700">${compare.stats.custs}</td></tr>
        <tr><td>دفعوا</td><td style="color:var(--green);font-weight:700">${compare.stats1.paid}</td><td style="color:var(--green);font-weight:700">${compare.stats16.paid}</td><td style="color:var(--green);font-weight:700">${compare.stats.paid}</td></tr>
        <tr><td>لم يدفعوا</td><td style="color:var(--amber);font-weight:700">${compare.stats1.unpaid}</td><td style="color:var(--amber);font-weight:700">${compare.stats16.unpaid}</td><td style="color:var(--amber);font-weight:700">${compare.stats.unpaid}</td></tr>
        <tr><td>الإيرادات</td><td>${compare.stats1.rev.toLocaleString('ar-EG')} ج</td><td>${compare.stats16.rev.toLocaleString('ar-EG')} ج</td><td style="font-weight:700">${compare.stats.rev.toLocaleString('ar-EG')} ج</td></tr>
        <tr><td>التكاليف</td><td>${compare.stats1.cost.toLocaleString('ar-EG')} ج</td><td>${compare.stats16.cost.toLocaleString('ar-EG')} ج</td><td>${compare.stats.cost.toLocaleString('ar-EG')} ج</td></tr>
        <tr class="total-row"><td>الربح الصافي</td><td>${compare.stats1.profit>=0?'+':''}${compare.stats1.profit.toLocaleString('ar-EG')} ج</td><td>${compare.stats16.profit>=0?'+':''}${compare.stats16.profit.toLocaleString('ar-EG')} ج</td><td>${compare.stats.profit>=0?'+':''}${compare.stats.profit.toLocaleString('ar-EG')} ج</td></tr>
      </tbody>
    </table>`;
  }

  // Breakdown per line
  html+=`<div class="section-title">تفصيل الخطوط</div>
  <table class="dash-table">
    <thead><tr><th>الخط</th><th>صاحب الخط</th><th>يوم</th><th>عملاء</th><th>دفعوا</th><th>الإيراد</th><th>التكلفة</th><th>الربح</th></tr></thead>
    <tbody>`;
  for(const line of s.lines_list){
    const lCusts=Object.values(m.customers[line.id]||{});
    const lPaid=lCusts.filter(c=>c.paidStatus==='paid');
    const lRev=lPaid.reduce((s2,c)=>s2+(c.paid||0),0);
    const lCost=line.wegoldPkg?.cost||0;
    const lProfit=lRev-lCost;
    html+=`<tr>
      <td style="font-family:monospace;font-weight:700">${line.number||'—'}</td>
      <td>${line.ownerName||'—'}</td>
      <td><span class="day-badge ${line.renewDay===1?'d1':'d16'}" style="font-size:10px;padding:2px 8px">يوم ${line.renewDay}</span></td>
      <td>${lPaid.length}/${lCusts.length}</td>
      <td><span style="color:var(--green);font-weight:700">${lPaid.length}</span></td>
      <td>${lRev.toLocaleString('ar-EG')} ج</td>
      <td style="color:var(--red)">${lCost.toLocaleString('ar-EG')} ج</td>
      <td style="font-weight:700;color:${lProfit>=0?'var(--green)':'var(--red)'}">${lProfit>=0?'+':''}${lProfit.toLocaleString('ar-EG')} ج</td>
    </tr>`;
  }
  if(!s.lines_list.length)html+=`<tr><td colspan="8" style="text-align:center;color:var(--sub);padding:20px">لا توجد خطوط</td></tr>`;
  html+='</tbody></table>';

  // Unpaid customers list
  const unpaidList=s.custs_list.filter(c=>c.paidStatus!=='paid');
  if(unpaidList.length){
    html+=`<div class="section-title" style="margin-top:20px">⏳ لم يدفعوا (${unpaidList.length})</div>
    <table class="dash-table">
      <thead><tr><th>الاسم</th><th>الرقم</th><th>الجيجا</th><th>الدقايق</th><th>السعر</th></tr></thead>
      <tbody>`;
    for(const c of unpaidList){
      const gb=c.customGb!==undefined?c.customGb:(PKG_DATA[c.pkgId]?.gb||'—');
      const min=c.customMin!==undefined?c.customMin:(PKG_DATA[c.pkgId]?.min||'—');
      const pr=c.customPrice||PKG_DATA[c.pkgId]?.price||0;
      html+=`<tr><td>${c.name||'—'}</td><td style="font-family:monospace;font-size:12px">${c.phone||''}</td>
        <td style="color:var(--blue);font-weight:700">${gb} GB</td>
        <td style="color:var(--accent);font-weight:700">${min} د</td>
        <td style="font-weight:700">${pr.toLocaleString('ar-EG')} ج</td></tr>`;
    }
    html+='</tbody></table>';
  }
  return html;
}

// ===== ADMIN PAGE =====
function renderAdmin(){
  const sys=getSys();const users=Object.values(sys.users);const fbUrl_=fbUrl();
  document.getElementById('page-admin').innerHTML=`
    <div class="page-title">⚙️ الإعدادات</div>
    <div class="admin-section">
      <h3>🔥 مزامنة Firebase</h3>
      <div class="fb-row">
        <input class="fb-input" id="fb-url-input" value="${fbUrl_}" placeholder="https://your-project.firebaseio.com" dir="ltr">
        <button class="fb-save" onclick="saveFbUrl()">حفظ</button>
        ${fbUrl_?`<button class="btn-sm" onclick="testFb()">اختبار</button>`:''}
      </div>
    </div>
    <div class="admin-section">
      <h3>👥 المستخدمون</h3>
      <table class="settings-table">
        <thead><tr><th>المستخدم</th><th>الاسم</th><th>الدور</th><th>كلمة المرور</th><th></th></tr></thead>
        <tbody>${users.map(u=>`<tr>
          <td style="font-family:monospace;font-weight:700">${u.username}</td>
          <td>${u.displayName}</td>
          <td><span class="badge-role ${u.role==='admin'?'badge-admin':'badge-user'}">${u.role==='admin'?'أدمن':'مستخدم'}</span></td>
          <td style="color:var(--sub);font-size:12px">${u.password}</td>
          <td><button class="btn-sm" onclick="showEditUser('${u.username}')">تعديل</button></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
  `;
}
function saveFbUrl(){
  const url=document.getElementById('fb-url-input').value.trim().replace(/\/$/,'');
  localStorage.setItem('lm_fb_url',url);toast(url?'✓ تم حفظ رابط Firebase':'تم مسح الرابط');renderAdmin();
}
async function testFb(){
  const url=fbUrl();if(!url){toast('أدخل الرابط أولاً',false);return;}
  try{const r=await fetch(`${url}/ping.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:'"ok"'});if(r.ok){fbStatus(true);toast('✓ الاتصال ناجح');}else{fbStatus(false);toast('فشل: '+r.status,false);}}catch(e){fbStatus(false);toast('خطأ: '+e.message,false);}
}
function showEditUser(un){
  const sys=getSys();const u=sys.users[un];if(!u)return;
  openModal(`${modalHead('تعديل المستخدم — '+un)}
  <div class="modal-body">
    <div class="mfl"><label>الاسم المعروض</label><input id="eu-name" value="${u.displayName}"></div>
    <div class="mfl"><label>كلمة المرور</label><input id="eu-pass" type="text" value="${u.password}"></div>
  </div>
  <div class="modal-foot"><button class="btn-cancel" onclick="closeModal()">إلغاء</button><button class="btn-save" onclick="saveUser('${un}')">حفظ</button></div>`);
}
function saveUser(un){
  const name=document.getElementById('eu-name').value.trim();
  const pass=document.getElementById('eu-pass').value.trim();
  if(!name||!pass){alert('أدخل جميع البيانات');return;}
  const sys=getSys();if(!sys.users[un])return;
  sys.users[un].displayName=name;sys.users[un].password=pass;
  saveSys(sys);closeModal();renderAdmin();toast('✓ تم تعديل المستخدم');
}

// ===== LOGS PAGE =====
function renderLogs(){
  const d=gd();const logs=d.logs||[];
  document.getElementById('page-logs').innerHTML=`
    <div class="page-title">📋 سجل التعديلات</div>
    <div style="background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden">
      ${logs.length?logs.slice(0,200).map(l=>`<div class="log-entry">
        <div class="log-ts">${formatTs(l.ts)}</div>
        <div class="log-action">${l.a}</div>
        <div class="log-detail">${l.d||''}</div>
      </div>`).join(''):'<div class="no-data">لا توجد سجلات بعد</div>'}
    </div>`;
}
function formatTs(ts){try{const d=new Date(ts);return d.toLocaleDateString('ar-EG')+' '+d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}catch{return ts;}}
