<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>إدارة الخطوط — WE GOLD</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0f2f5;--card:#fff;--border:#e2e8f0;--text:#0f172a;--sub:#64748b;
  --accent:#6b2fa0;--accent-lt:#f3e8ff;--accent-dk:#4a1d7a;
  --green:#16a34a;--green-lt:#dcfce7;--red:#dc2626;--red-lt:#fee2e2;
  --amber:#d97706;--amber-lt:#fef3c7;--blue:#2563eb;--blue-lt:#dbeafe;
  --day1:#1d4ed8;--day16:#7c3aed;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1);
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;font-size:14px;direction:rtl;}

/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1e1b4b,#312e81,#4c1d95);
  display:flex;align-items:center;justify-content:center;z-index:999;padding:20px;}
.login-box{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-logo-row{display:flex;justify-content:center;gap:8px;margin-bottom:20px;}
.logo-sq{width:38px;height:38px;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.2);}
.logo-sq svg{width:100%;height:100%;}
.login-title{text-align:center;font-size:20px;font-weight:800;color:#1e1b4b;margin-bottom:4px;}
.login-sub{text-align:center;color:var(--sub);font-size:13px;margin-bottom:28px;}
.fl{margin-bottom:14px;}
.fl label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;}
.fl input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;
  font-size:14px;color:var(--text);outline:none;transition:.2s;}
.fl input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(107,47,160,.1);}
.login-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:10px;
  padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:.2s;}
.login-btn:hover{background:var(--accent-dk);}
.login-err{color:var(--red);font-size:13px;margin-top:8px;text-align:center;min-height:18px;}

/* ===== NAV ===== */
nav{background:#fff;border-bottom:1.5px solid var(--border);padding:0 20px;
  display:none;align-items:center;justify-content:space-between;height:54px;
  position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.nav-brand{font-size:15px;font-weight:800;color:var(--accent);display:flex;align-items:center;gap:8px;}
.nav-brand span{color:var(--text);}
.nav-links{display:flex;gap:4px;}
.nav-link{background:none;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--sub);transition:.15s;}
.nav-link:hover{background:var(--accent-lt);color:var(--accent);}
.nav-link.active{background:var(--accent-lt);color:var(--accent);}
.nav-right{display:flex;align-items:center;gap:10px;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--sub);transition:.3s;}
.user-badge{background:var(--accent-lt);color:var(--accent);font-size:12px;font-weight:700;
  padding:4px 12px;border-radius:20px;}
.logout-btn{background:none;border:1.5px solid var(--red);color:var(--red);
  padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;transition:.15s;}
.logout-btn:hover{background:var(--red-lt);}

/* ===== MONTH BAR ===== */
#month-bar{background:#fff;border-bottom:1px solid var(--border);padding:8px 20px;
  display:none;align-items:center;gap:8px;overflow-x:auto;}
.mchip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;
  border:1.5px solid var(--border);background:none;color:var(--sub);white-space:nowrap;transition:.15s;}
.mchip.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.mchip:hover:not(.act){border-color:var(--accent);color:var(--accent);}
.add-month-btn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  border:1.5px dashed var(--accent);color:var(--accent);background:none;cursor:pointer;
  white-space:nowrap;transition:.15s;}
.add-month-btn:hover{background:var(--accent-lt);}

/* ===== PAGES ===== */
.page{display:none;padding:20px;max-width:1100px;margin:0 auto;}
.page.show{display:block;}

/* ===== STATS BAR ===== */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:#fff;border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--border);}
.stat-val{font-size:26px;font-weight:800;color:var(--text);}
.stat-lbl{font-size:11px;font-weight:700;color:var(--sub);margin-top:3px;}
.stat-card.green .stat-val{color:var(--green);}
.stat-card.red .stat-val{color:var(--red);}
.stat-card.amber .stat-val{color:var(--amber);}
.stat-card.accent .stat-val{color:var(--accent);}

/* ===== FILTER TABS ===== */
.filter-tabs{display:flex;gap:8px;margin-bottom:16px;align-items:center;}
.ftab{padding:6px 16px;border-radius:8px;border:1.5px solid var(--border);background:#fff;
  color:var(--sub);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.ftab.act{background:var(--accent);color:#fff;border-color:var(--accent);}
.ftab:hover:not(.act){border-color:var(--accent);color:var(--accent);}
.spacer{flex:1;}
.btn-add-line{padding:8px 18px;border-radius:8px;background:var(--accent);color:#fff;
  border:none;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:6px;}
.btn-add-line:hover{background:var(--accent-dk);}

/* ===== DAY SECTION ===== */
.day-section{margin-bottom:24px;}
.day-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.day-badge{padding:5px 16px;border-radius:20px;font-size:12px;font-weight:800;color:#fff;}
.day-badge.d1{background:var(--day1);}
.day-badge.d16{background:var(--day16);}
.day-meta{font-size:12px;color:var(--sub);font-weight:600;}

/* ===== LINE CARD ===== */
.line-card{background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);
  margin-bottom:12px;overflow:hidden;}
.line-hdr{display:flex;align-items:center;gap:12px;padding:12px 16px;
  border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;gap:8px;}
.line-num{font-size:15px;font-weight:800;color:var(--text);font-family:monospace;letter-spacing:.5px;}
.line-owner{font-size:12px;color:var(--sub);font-weight:600;background:var(--border);
  padding:2px 10px;border-radius:20px;}
.line-stat{font-size:12px;font-weight:700;padding:2px 10px;border-radius:20px;}
.ls-paid{background:var(--green-lt);color:var(--green);}
.ls-pend{background:var(--amber-lt);color:var(--amber);}
.ls-rev{background:var(--blue-lt);color:var(--blue);}
.ls-profit{background:var(--green-lt);color:var(--green);}
.ls-profit.neg{background:var(--red-lt);color:var(--red);}
.line-actions-group{display:flex;gap:6px;margin-right:auto;}
.btn-sm{padding:5px 12px;border-radius:7px;border:1.5px solid var(--border);background:#fff;
  color:var(--text);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-sm:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm.danger:hover{border-color:var(--red);color:var(--red);}
.btn-sm.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-sm.primary:hover{background:var(--accent-dk);}

/* ===== CUSTOMERS TABLE ===== */
.custs-table{width:100%;border-collapse:collapse;}
.custs-table th{padding:8px 12px;text-align:center;font-size:11px;font-weight:700;
  color:var(--sub);background:var(--bg);border-bottom:1px solid var(--border);}
.custs-table th:first-child{text-align:right;}
.custs-table td{padding:9px 12px;text-align:center;border-bottom:1px solid var(--border);
  font-size:13px;color:var(--text);}
.custs-table td:first-child{text-align:right;font-weight:600;}
.custs-table td:nth-child(2){font-family:monospace;font-size:12px;color:var(--sub);}
.custs-table tr:last-child td{border-bottom:none;}
.custs-table tr:hover td{background:#fafafa;}
.toggle-paid{border:none;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;
  cursor:pointer;transition:.15s;white-space:nowrap;}
.tp-paid{background:var(--green-lt);color:var(--green);}
.tp-paid:hover{background:#bbf7d0;}
.tp-pend{background:var(--red-lt);color:var(--red);}
.tp-pend:hover{background:#fecaca;}
.pkg-badge{background:var(--accent-lt);color:var(--accent);padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;}
.act-btns{display:flex;gap:4px;justify-content:center;}
.act-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border);background:#fff;
  cursor:pointer;font-size:13px;transition:.15s;display:flex;align-items:center;justify-content:center;}
.act-btn:hover{background:var(--accent-lt);border-color:var(--accent);}
.act-btn.del:hover{background:var(--red-lt);border-color:var(--red);}
.add-cust-row{padding:10px 16px;text-align:center;}
.btn-add-cust{background:none;border:1.5px dashed var(--accent);color:var(--accent);
  border-radius:8px;padding:6px 18px;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-add-cust:hover{background:var(--accent-lt);}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--sub);}
.empty-state .ei{font-size:40px;margin-bottom:10px;}
.empty-state p{font-size:14px;font-weight:600;}

/* ===== MODAL ===== */
#modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:500;align-items:center;justify-content:center;padding:20px;}
#modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;box-shadow:var(--shadow-md);
  max-height:90vh;overflow-y:auto;}
.modal-head{display:flex;align-items:center;justify-content:space-between;
  padding:18px 22px 14px;border-bottom:1px solid var(--border);}
.modal-title{font-size:16px;font-weight:800;color:var(--text);}
.modal-close{width:30px;height:30px;border-radius:8px;border:1.5px solid var(--border);
  background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
.modal-close:hover{background:var(--red-lt);border-color:var(--red);color:var(--red);}
.modal-body{padding:20px 22px;}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
.mfl{margin-bottom:14px;}
.mfl label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:5px;}
.mfl input,.mfl select,.mfl textarea{width:100%;border:1.5px solid var(--border);border-radius:9px;
  padding:10px 13px;font-size:13px;color:var(--text);outline:none;transition:.2s;font-family:inherit;}
.mfl input:focus,.mfl select:focus,.mfl textarea:focus{border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(107,47,160,.1);}
.mfl .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-save{background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-save:hover{background:var(--accent-dk);}
.btn-cancel{background:#fff;color:var(--sub);border:1.5px solid var(--border);border-radius:9px;
  padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-cancel:hover{border-color:var(--text);color:var(--text);}
.btn-delete-modal{background:var(--red-lt);color:var(--red);border:1.5px solid var(--red);
  border-radius:9px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;}

/* ===== ADMIN PAGE ===== */
.admin-section{background:#fff;border-radius:12px;padding:20px;box-shadow:var(--shadow);
  border:1px solid var(--border);margin-bottom:16px;}
.admin-section h3{font-size:14px;font-weight:800;margin-bottom:14px;color:var(--accent);}
.settings-table{width:100%;border-collapse:collapse;}
.settings-table th{font-size:11px;font-weight:700;color:var(--sub);padding:8px;text-align:right;
  border-bottom:1px solid var(--border);}
.settings-table td{padding:10px 8px;border-bottom:1px solid var(--border);font-size:13px;}
.settings-table tr:last-child td{border:none;}
.badge-role{padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.badge-admin{background:var(--amber-lt);color:var(--amber);}
.badge-user{background:var(--blue-lt);color:var(--blue);}
.fb-row{display:flex;gap:8px;align-items:center;}
.fb-input{flex:1;border:1.5px solid var(--border);border-radius:9px;padding:10px 13px;
  font-size:13px;color:var(--text);outline:none;}
.fb-input:focus{border-color:var(--accent);}
.fb-save{background:var(--accent);color:#fff;border:none;border-radius:9px;
  padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;}

/* ===== LOGS ===== */
.log-entry{display:flex;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:flex-start;}
.log-ts{font-size:11px;color:var(--sub);white-space:nowrap;margin-top:2px;}
.log-action{font-size:12px;font-weight:700;color:var(--accent);background:var(--accent-lt);
  padding:1px 8px;border-radius:10px;white-space:nowrap;}
.log-detail{font-size:13px;color:var(--text);}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:#1e293b;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;font-weight:600;
  z-index:9999;display:none;box-shadow:var(--shadow-md);}

/* ===== MISC ===== */
.page-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:16px;}
.no-data{text-align:center;padding:30px;color:var(--sub);font-weight:600;}
@media(max-width:600px){
  .line-hdr{flex-direction:column;align-items:flex-start;}
  .line-actions-group{margin-right:0;width:100%;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
</style>
</head>

// Firebase
function fbUrl(){return localStorage.getItem('lm_fb_url')||'';}
function fbStatus(ok){const e=document.getElementById('sync-dot');if(e)e.style.background=ok===null?'#94a3b8':ok?'#16a34a':'#dc2626';}
async function fbPush(un,data){const u=fbUrl();if(!u)return;try{const r=await fetch(`${u}/users/${encodeURIComponent(un)}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({data,t:Date.now()})});fbStatus(r.ok);}catch{fbStatus(false);}}
async function fbPull(un){const u=fbUrl();if(!u)return null;try{const r=await fetch(`${u}/users/${encodeURIComponent(un)}.json`);if(!r.ok)return null;const j=await r.json();fbStatus(true);return j?.data||null;}catch{fbStatus(false);return null;}}

// Storage
function getSys(){
  let d=localStorage.getItem(SYS_KEY);
  if(!d){for(const k of['lm_sys_v6','lm_sys_v5','lm_sys_v4','lm_sys_v3','lm_sys_v2']){const o=localStorage.getItem(k);if(o){d=o;localStorage.setItem(SYS_KEY,o);break;}}}
  return d?JSON.parse(d):initSys();
}
function initSys(){
  const s={users:{
    admin:{username:'admin',displayName:'الأدمن',password:'admin123',role:'admin',data:{}},
    'ahmed.h':{username:'ahmed.h',displayName:'Ahmed H',password:'WeGold2000',role:'user',data:{}},
    'rania.m':{username:'rania.m',displayName:'Rania M',password:'WeGold2000',role:'user',data:{}},
    'madona.n':{username:'madona.n',displayName:'Madona N',password:'WeGold2000',role:'user',data:{}},
  }};
  localStorage.setItem(SYS_KEY,JSON.stringify(s));return s;
}
function saveSys(s){localStorage.setItem(SYS_KEY,JSON.stringify(s));if(CU)fbPush(CU.username,s.users[CU.username]?.data);}
function applySeed(un){
  const s=getSys();const u=s.users[un];if(!u)return;
  const sd=SEED[un];if(!sd)return;
  if(!u.data)u.data={};if(!u.data.months)u.data.months={};
  let changed=false;
  for(const[mk,mv]of Object.entries(sd.months)){if(!u.data.months[mk]){u.data.months[mk]=mv;changed=true;}}
  if(u.seedVersion!==SEED_VERSION){u.seedVersion=SEED_VERSION;changed=true;}
  if(changed)saveSys(s);
}
let CU=null, CM='';
function gd(){const s=getSys();return s.users[CU.username].data||{};}
function sd2(d){const s=getSys();s.users[CU.username].data=d;saveSys(s);}
function gm(){const d=gd();if(!d.months||!d.months[CM])return null;return d.months[CM];}
function sm(m){const d=gd();if(!d.months)d.months={};d.months[CM]=m;sd2(d);}
function getAllMonths(){const d=gd();if(!d.months)return[];return Object.values(d.months).sort((a,b)=>b.key.localeCompare(a.key));}
function getMonthLabel(key){const p=key.split('-');const names=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return(names[parseInt(p[1])-1]||p[1])+' '+p[0];}
function uid(){return '_'+Math.random().toString(36).slice(2,9);}

// Audit log
function addLog(action,detail){
  try{const d=gd();if(!d.logs)d.logs=[];
  d.logs.unshift({ts:new Date().toISOString(),u:CU.username,n:CU.displayName,a:action,d:detail});
  if(d.logs.length>500)d.logs.length=500;sd2(d);}catch{}
}

// ===== LOGIN / LOGOUT =====
document.getElementById('login-pass').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('login-user').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('login-pass').focus();});
async function doLogin(){
  const un=document.getElementById('login-user').value.trim().toLowerCase();
  const pw=document.getElementById('login-pass').value;
  const sys=getSys();const user=sys.users[un];
  if(!user||user.password!==pw){document.getElementById('login-error').textContent='اسم المستخدم أو كلمة المرور غير صحيحة';return;}
  document.getElementById('login-error').textContent='جاري تسجيل الدخول...';
  CU={username:user.username,displayName:user.displayName,role:user.role};
  const cloud=await fbPull(un);
  if(cloud){const s=getSys();s.users[un].data=cloud;localStorage.setItem(SYS_KEY,JSON.stringify(s));}
  applySeed(un);
  document.getElementById('login-error').textContent='';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-nav').style.display='flex';
  document.getElementById('month-bar').style.display='flex';
  document.getElementById('nav-username').textContent=user.displayName;
  if(user.role==='admin')document.getElementById('nav-admin').style.display='';
  const months=getAllMonths();
  CM=months.length?months[0].key:(()=>{
    const now=new Date();const key=now.getFullYear()+'-'+(now.getMonth()+1).toString().padStart(2,'0');
    const d=gd();d.months=d.months||{};d.months[key]={key,label:getMonthLabel(key),lines:{we:{},vodafone:{},emerald:{},orange:{}},packages:{we:{},vodafone:{},emerald:{},orange:{}},customers:{},companySettings:{we:{maxDist:6},vodafone:{maxDist:6},emerald:{maxDist:6},orange:{maxDist:6}}};sd2(d);return key;
  })();
  renderMonthBar();showPage('home');
}
function doLogout(){
  CU=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('main-nav').style.display='none';
  document.getElementById('month-bar').style.display='none';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.getElementById('login-user').value='';document.getElementById('login-pass').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('nav-admin').style.display='none';
}

// ===== NAVIGATION =====
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-link').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('show');
  document.querySelectorAll('.nav-link').forEach(b=>{if(b.onclick&&b.onclick.toString().includes("'"+name+"'"))b.classList.add('active');});
  if(name==='home')renderHome();
  else if(name==='admin')renderAdmin();
  else if(name==='logs')renderLogs();
}

// ===== MONTH BAR =====
function renderMonthBar(){
  const months=getAllMonths();
  document.getElementById('month-chips').innerHTML=months.map(m=>`<button class="mchip ${m.key===CM?'act':''}" onclick="selectMonth('${m.key}')">${m.label||getMonthLabel(m.key)}</button>`).join('');
}

// ===== HOME PAGE =====
function renderHome(){
  const m=gm();
  const el=document.getElementById('page-home');
  if(!m){el.innerHTML='<div class="no-data">لا توجد بيانات لهذا الشهر</div>';return;}

  // Collect stats
  const allLines=getAllLines(m);
  const allCusts=getAllCusts(m);
  const nPaid=allCusts.filter(c=>c.paidStatus==='paid').length;
  const rev=allCusts.reduce((s,c)=>s+(c.paid||0),0);
  const cost=allLines.reduce((s,l)=>s+(l.wegoldPkg?.cost||0),0);
  const profit=rev-cost;
  const pct=allCusts.length?Math.round(nPaid/allCusts.length*100):0;

  const day1Lines=allLines.filter(l=>l.renewDay===1).sort((a,b)=>a.number.localeCompare(b.number));
  const day16Lines=allLines.filter(l=>l.renewDay===16).sort((a,b)=>a.number.localeCompare(b.number));

  el.innerHTML=`
    <div class="stats-row">
      <div class="stat-card"><div class="stat-val">${allLines.length}</div><div class="stat-lbl">إجمالي الخطوط</div></div>
      <div class="stat-card"><div class="stat-val">${allCusts.length}</div><div class="stat-lbl">إجمالي العملاء</div></div>
      <div class="stat-card green"><div class="stat-val">${nPaid}</div><div class="stat-lbl">دفعوا ✓</div></div>
      <div class="stat-card ${allCusts.length-nPaid>0?'amber':'green'}"><div class="stat-val">${allCusts.length-nPaid}</div><div class="stat-lbl">لم يدفعوا ⏳</div></div>
      <div class="stat-card accent"><div class="stat-val">${pct}%</div><div class="stat-lbl">نسبة التحصيل</div></div>
      <div class="stat-card"><div class="stat-val">${rev.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الإيرادات</div></div>
      <div class="stat-card ${profit>=0?'green':'red'}"><div class="stat-val">${profit.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الربح الصافي</div></div>
    </div>
    <div class="filter-tabs">
      <button class="ftab act" id="ft-all" onclick="setFilter('all')">الكل (${allLines.length})</button>
      <button class="ftab" id="ft-d1" onclick="setFilter('d1')">يوم 1 (${day1Lines.length})</button>
      <button class="ftab" id="ft-d16" onclick="setFilter('d16')">يوم 16 (${day16Lines.length})</button>
      <div class="spacer"></div>
      <button class="btn-add-line" onclick="showAddLine(1)">+ خط جديد يوم 1</button>
      <button class="btn-add-line" style="background:var(--day16)" onclick="showAddLine(16)">+ خط جديد يوم 16</button>
    </div>
    <div id="lines-container"></div>
  `;
  renderLinesContainer(day1Lines, day16Lines);
}

let _curFilter='all';
function setFilter(f){
  _curFilter=f;
  ['all','d1','d16'].forEach(x=>document.getElementById('ft-'+x)?.classList.toggle('act',x===f));
  const m=gm();if(!m)return;
  const all=getAllLines(m);
  renderLinesContainer(all.filter(l=>l.renewDay===1),all.filter(l=>l.renewDay===16));
}

function renderLinesContainer(day1,day16){
  const el=document.getElementById('lines-container');
  if(!el)return;
  let html='';
  if(_curFilter!=='d16'&&day1.length){
    html+=`<div class="day-section">
      <div class="day-hdr"><span class="day-badge d1">يوم 1</span><span class="day-meta">${day1.length} خط — دفع أول الشهر</span></div>
      ${day1.map(l=>renderLineCard(l)).join('')}
    </div>`;
  }
  if(_curFilter!=='d1'&&day16.length){
    html+=`<div class="day-section">
      <div class="day-hdr"><span class="day-badge d16">يوم 16</span><span class="day-meta">${day16.length} خط — دفع يوم 16</span></div>

  el.innerHTML=html;
}

// ===== HELPERS =====
function getAllLines(m){
  if(!m)return[];
  return Object.values(COMPANIES).flatMap(co=>Object.values(m.lines[Object.keys(COMPANIES).find(k=>COMPANIES[k]===co)]||{}));
}
function getAllLinesKeyed(m){
  if(!m)return{};
  const res={};
  for(const co of Object.keys(COMPANIES)){for(const[lid,l]of Object.entries(m.lines[co]||{}))res[lid]={...l,_co:co};}
  return res;
}
function getAllCusts(m){
  if(!m)return[];
  return Object.values(m.customers||{}).flatMap(lc=>Object.values(lc));
}
function findLine(lid){
  const m=gm();if(!m)return null;
  for(const co of Object.keys(COMPANIES)){const l=m.lines[co]?.[lid];if(l)return{...l,_co:co};}
  return null;
}

// ===== TOGGLE PAID =====
function togglePaid(lid,cid){
  const m=gm();if(!m||!m.customers[lid]||!m.customers[lid][cid])return;
  const c=m.customers[lid][cid];
  const wasPaid=c.paidStatus==='paid';
  c.paidStatus=wasPaid?'pending':'paid';
  c.paid=wasPaid?0:(PKG_PRICE[c.pkgId]||0);
  sm(m);
  addLog('تحديث دفع',`${c.name||c.phone} — ${c.paidStatus==='paid'?'دفع ✓':'معلق ⏳'}`);
  // Re-render just this line card for speed
  const line=findLine(lid);if(!line)return;
  const cardEl=document.getElementById('lc-'+lid);
  if(cardEl){const tmp=document.createElement('div');tmp.innerHTML=renderLineCard(line);cardEl.replaceWith(tmp.firstChild);}
  // Update stats bar
  renderStatsBar();
  toast(c.paidStatus==='paid'?`✓ ${c.name||c.phone} — دفع`:`⏳ ${c.name||c.phone} — معلق`,c.paidStatus==='paid');
}

function renderStatsBar(){
  const m=gm();if(!m)return;
  const allLines=getAllLines(m);
  const allCusts=getAllCusts(m);
  const nPaid=allCusts.filter(c=>c.paidStatus==='paid').length;
  const rev=allCusts.reduce((s,c)=>s+(c.paid||0),0);
  const cost=allLines.reduce((s,l)=>s+(l.wegoldPkg?.cost||0),0);
  const profit=rev-cost;
  const pct=allCusts.length?Math.round(nPaid/allCusts.length*100):0;
  const el=document.querySelector('#page-home .stats-row');
  if(el)el.innerHTML=`
    <div class="stat-card"><div class="stat-val">${allLines.length}</div><div class="stat-lbl">إجمالي الخطوط</div></div>
    <div class="stat-card"><div class="stat-val">${allCusts.length}</div><div class="stat-lbl">إجمالي العملاء</div></div>
    <div class="stat-card green"><div class="stat-val">${nPaid}</div><div class="stat-lbl">دفعوا ✓</div></div>
    <div class="stat-card ${allCusts.length-nPaid>0?'amber':'green'}"><div class="stat-val">${allCusts.length-nPaid}</div><div class="stat-lbl">لم يدفعوا ⏳</div></div>
    <div class="stat-card accent"><div class="stat-val">${pct}%</div><div class="stat-lbl">نسبة التحصيل</div></div>
    <div class="stat-card"><div class="stat-val">${rev.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الإيرادات</div></div>
    <div class="stat-card ${profit>=0?'green':'red'}"><div class="stat-val">${profit.toLocaleString('ar-EG')} ج</div><div class="stat-lbl">الربح الصافي</div></div>
  `;
}

function saveLine(lid=null,co='we'){
  const num=document.getElementById('ml-num').value.trim();

  const pkg=WE_GOLD_PKGS[pkgIdx];

  if(!lid){
    lid='l_'+num.slice(-6)+'_'+uid();

function addMonth(){

  const d=gd();if(!d.months)d.months={};
  if(d.months[key]){alert('هذا الشهر موجود بالفعل');return;}
  d.months[key]={key,label,lines:{we:{},vodafone:{},emerald:{},orange:{}},packages:{we:{},vodafone:{},emerald:{},orange:{}},customers:{},companySettings:{we:{maxDist:6},vodafone:{maxDist:6},emerald:{maxDist:6},orange:{maxDist:6}}};
  sd2(d);CM=key;closeModal();renderMonthBar();renderHome();
  addLog('إضافة شهر',`${label}`);toast('✓ تم إنشاء الشهر');
}

function getMonthLabel(key){const p=key.split('-');const names=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];return(names[parseInt(p[1])-1]||p[1])+' '+p[0];}

  document.getElementById('page-logs').innerHTML=`
    <div class="page-title">📋 سجل التعديلات</div>
    <div style="background:#fff;border-radius:12px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden">
      ${logs.length?logs.slice(0,200).map(l=>`<div class="log-entry">
        <div class="log-ts">${formatTs(l.ts)}</div>
        <div class="log-action">${l.a}</div>
        <div class="log-detail">${l.d||''}</div>
      </div>`).join(''):'<div class="no-data">لا توجد سجلات بعد</div>'}
    </div>
  `;
}
function formatTs(ts){try{const d=new Date(ts);return d.toLocaleDateString('ar-EG')+' '+d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});}catch{return ts;}}
</script>
</body>
</html>
